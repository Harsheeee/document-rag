services:
  rag:
    build: .
    # host networking lets the container reach Ollama at localhost:11434
    network_mode: host
    env_file:
      - .env
    volumes:
      # Mount data/ so you can add documents without rebuilding
      - ./data:/app/data
    # Default CMD runs Streamlit (see Dockerfile)
    # To run ingestion instead:
    #   docker compose run rag python ingestion.py
